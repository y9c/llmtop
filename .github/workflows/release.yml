name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Lint
        run: go vet ./...

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          GOARCH=${{ matrix.arch }} GOOS=linux go build \
            -ldflags="-s -w -X main.version=$VERSION" \
            -trimpath -o llmtop-linux-${{ matrix.arch }} ./cmd/llm-top/

      - name: Test
        run: go test ./... -v

      - uses: actions/upload-artifact@v4
        with:
          name: llmtop-linux-${{ matrix.arch }}
          path: llmtop-linux-${{ matrix.arch }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: llmtop-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            llmtop-linux-* \
            --title "${{ github.ref_name }}" \
            --generate-notes

  nightly:
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: llmtop-*
          merge-multiple: true

      - name: Nightly release (overwrite on each push)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)

          # Delete old nightly release + tag if exists
          gh release delete nightly --yes --repo "${{ github.repository }}" 2>/dev/null || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/nightly" 2>/dev/null || true

          # Build release notes as a variable to avoid YAML issues
          NOTES="Auto-built from main@${SHORT_SHA}. Updated on every push."
          NOTES+=" Quick install: curl -sL https://github.com/y9c/llmtop/releases/latest/download/llmtop-linux-amd64 -o /usr/local/bin/llmtop && chmod +x /usr/local/bin/llmtop"
          NOTES+=" For arm64, replace amd64 with arm64."

          # Create new nightly release — marked as latest so install.sh works
          gh release create "nightly" \
            llmtop-linux-* \
            --title "Nightly (${TIMESTAMP})" \
            --notes "${NOTES}" \
            --latest
